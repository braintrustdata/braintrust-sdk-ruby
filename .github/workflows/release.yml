#
# Primary release workflow for the Ruby SDK.
# Triggered manually via GitHub Actions UI (browser session required — not via local git push).
# Reads the version from lib/braintrust/version.rb on main, posts a job summary with the
# list of changes for the reviewer, then waits for human approval before publishing.
#

name: Release Ruby SDK

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run — validate, notify, and build without pushing the gem or creating a tag"
        type: boolean
        default: false

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
      sha: ${{ steps.get-tag.outputs.sha }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: main
          fetch-depth: 0

      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Read version and validate
        id: get-tag
        run: |
          VERSION=$(ruby -r "./lib/braintrust/version.rb" -e "puts Braintrust::VERSION")
          TAG="v${VERSION}"
          SHA=$(git log -1 --format="%H" -- lib/braintrust/version.rb)

          if git rev-parse "$TAG" >/dev/null 2>&1; then
            if [ "${{ inputs.dry_run }}" = "true" ]; then
              echo "Warning: Tag $TAG already exists — skipping in dry run"
            else
              echo "Error: Tag $TAG already exists — has the version been bumped?"
              exit 1
            fi
          fi

          echo "tag=$TAG" >> $GITHUB_OUTPUT
          echo "sha=$SHA" >> $GITHUB_OUTPUT
          echo "Ready to release $TAG @ $SHA"

  notify:
    needs: validate
    runs-on: ubuntu-latest
    timeout-minutes: 5
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}
          fetch-depth: 0

      - name: Post release summary and notify Slack
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_SDK_RELEASE_CHANNEL }}
          TAG: ${{ needs.validate.outputs.release_tag }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          PREVIOUS_TAG=$(git describe --tags --abbrev=0 \
            --match='v[0-9]*.[0-9]*.[0-9]*' HEAD^ 2>/dev/null || echo "")

          NOTES=$(gh api "repos/$GITHUB_REPOSITORY/releases/generate-notes" \
            --method POST \
            --field tag_name="$TAG" \
            --jq '.body' 2>/dev/null) || NOTES="_Release notes unavailable._"

          APPROVE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/actions/runs/$GITHUB_RUN_ID"

          # Write full PR list to job summary — visible on the approval page
          echo "## braintrust-sdk-ruby $TAG" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "$NOTES" >> $GITHUB_STEP_SUMMARY

          # Slack message is intentionally brief — full details are one click away
          DRY_RUN=${{ inputs.dry_run }}
          if [ "$DRY_RUN" = "true" ]; then
            TEXT=":test_tube: *braintrust-sdk-ruby $TAG* DRY RUN — awaiting approval. <$APPROVE_URL|View changes & approve>"
          else
            TEXT=":gem: *braintrust-sdk-ruby $TAG* is awaiting release approval. <$APPROVE_URL|View changes & approve>"
          fi

          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"$SLACK_CHANNEL\", \"text\": \"$TEXT\"}"

  publish:
    needs: [validate, notify]
    runs-on: ubuntu-latest
    timeout-minutes: 15
    environment: ${{ inputs.dry_run && 'rubygems-publish-dry-run' || 'rubygems-publish' }}

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          ref: ${{ needs.validate.outputs.sha }}
          fetch-depth: 0

      - uses: ruby/setup-ruby@afeafc3d1ab54a631816aba4c914a0081c12ff2f # v1.310.0
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Create release tag
        if: ${{ !inputs.dry_run }}
        run: git tag "$GITHUB_REF_NAME"
        env:
          GITHUB_REF_NAME: ${{ needs.validate.outputs.release_tag }}

      - name: Publish gem with attestation
        if: ${{ !inputs.dry_run }}
        uses: rubygems/release-gem@6317d8d1f7e28c24d28f6eff169ea854948bd9f7 # v1.2.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REF_NAME: ${{ needs.validate.outputs.release_tag }}

      - name: Dry run — lint and build only
        if: ${{ inputs.dry_run }}
        env:
          GITHUB_REF_NAME: ${{ needs.validate.outputs.release_tag }}
        run: |
          bundle exec rake lint
          bundle exec rake build
          echo "DRY RUN: would push gem $GITHUB_REF_NAME to RubyGems and create tag"

      - name: Notify Slack on release
        env:
          SLACK_BOT_TOKEN: ${{ secrets.SLACK_BOT_TOKEN }}
          SLACK_CHANNEL: ${{ vars.SLACK_SDK_RELEASE_CHANNEL }}
          TAG: ${{ needs.validate.outputs.release_tag }}
        run: |
          RELEASE_URL="$GITHUB_SERVER_URL/$GITHUB_REPOSITORY/releases/tag/$TAG"
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            TEXT=":test_tube: *braintrust-sdk-ruby $TAG* DRY RUN complete — gem built, nothing pushed."
          else
            TEXT=":white_check_mark: *braintrust-sdk-ruby $TAG* has been published to RubyGems. <$RELEASE_URL|View release>"
          fi
          curl -s -X POST "https://slack.com/api/chat.postMessage" \
            -H "Authorization: Bearer $SLACK_BOT_TOKEN" \
            -H "Content-Type: application/json" \
            -d "{\"channel\": \"$SLACK_CHANNEL\", \"text\": \"$TEXT\"}"
