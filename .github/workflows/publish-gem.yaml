#
# This workflow publishes the Ruby SDK to RubyGems when a release tag is pushed.
# It validates the tag, ensures the commit is on main, runs tests, and publishes.
#

name: Publish Ruby SDK

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  validate:
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.get-tag.outputs.tag }}
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Get release tag
        id: get-tag
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Set up Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Validate release tag
        run: bash scripts/validate-release-tag.sh

  publish:
    needs: validate
    runs-on: ubuntu-latest

    permissions:
      contents: write
      id-token: write

    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1
        with:
          fetch-depth: 0

      - name: Set up Ruby
        uses: ruby/setup-ruby@319994f95fa847cf3fb3cd3dbe89f6dcde9f178f # v1.295.0
        with:
          ruby-version: '3.4'
          bundler-cache: true

      - name: Configure RubyGems credentials
        uses: rubygems/configure-rubygems-credentials@a991f145d5e4a60c4b0a3ddb204f557dc1a4f985 # main
      - name: Release
        run: bundle exec rake release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
